; ============================================================
; SWET_IOT - PlatformIO Project Configuration
; Target: ESP32 NodeMCU-32S + ProtoCentral ADS1292R Breakout v3.1
; Firmware v10.0 - Full ECG Pipeline Port from Arduino v10.0
; ============================================================

[env:nodemcu-32s]
platform    = espressif32
board       = nodemcu-32s
framework   = arduino

; --- Serial Monitor ---
monitor_speed = 115200

; --- Upload ---
upload_speed  = 921600

; --- Build Flags ---
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -Wall
    ; Needed for M_PI in math.h on some toolchain versions
    -D _USE_MATH_DEFINES
    ; Required by WiFiManager
    -D CONFIG_ASYNC_TCP_USE_WDT=0

; --- Source directories ---
; PlatformIO automatically includes src/ and any subdirs in src/.
; No extra src_filter needed.

; --- Library Dependencies ---
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    h2zero/NimBLE-Arduino @ ^1.4.1
